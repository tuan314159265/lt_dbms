  # MongoDB 7.0 (Transaction Demo)
  mongodb:
    image: mongo:7.0
    container_name: temp-mongodb
    environment:
      MONGO_INITDB_DATABASE: cinema_db
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts:/scripts
      - ./mongodb:/mongodb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: mongod --replSet rs0
    networks:
      - cinema-network

volumes:
  # oracle_data:
  #   driver: local
  mongodb_data:
    driver: local

networks:
  cinema-network:
    driver: bridge
